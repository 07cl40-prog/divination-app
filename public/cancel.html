<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — CaiShen 财神文创</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 20px; max-width: 500px; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 900; margin-bottom: 12px; color: #fbbf24; }
    p { color: #9ca3af; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #b91c1c, #dc2626); color: #fff; text-decoration: none; border-radius: 16px; font-weight: 700; font-size: 16px; transition: all 0.2s; border: none; cursor: pointer; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(185, 28, 28, 0.4); }
    .btn-outline { background: transparent; border: 2px solid rgba(217, 119, 6, 0.5); margin-left: 12px; }
    .btn-outline:hover { background: rgba(217, 119, 6, 0.1); box-shadow: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">😔</div>
    <h1>Order Cancelled</h1>
    <p>您的订单已取消。Your payment was not processed.<br>Feel free to try again anytime.</p>
    <a href="/" class="btn">Back to Shop</a>
    <a href="/" class="btn btn-outline" style="margin-left:12px;">Contact Support</a>
  </div>
</body>
</html>
